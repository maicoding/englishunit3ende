<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Across cultures 3 - Vokabeltrainer</title>
  <style>
    :root {
      --bg: #f6f3ec;
      --ink: #17201f;
      --muted: #63706d;
      --line: #d7d1c4;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-2: #b45309;
      --good: #15803d;
      --bad: #b91c1c;
      --warn: #ca8a04;
      --soft: #e8f3f1;
      --shadow: 0 18px 50px rgba(24, 31, 29, .10);
    }

    * { box-sizing: border-box; }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15, 118, 110, .10), transparent 35%),
        linear-gradient(315deg, rgba(180, 83, 9, .10), transparent 38%),
        var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 14px;
      min-height: 44px;
      background: var(--ink);
      color: white;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
      touch-action: manipulation;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .ghost {
      background: transparent;
      color: var(--ink);
      border-color: var(--line);
    }

    .accent { background: var(--accent); }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px;
      width: 100%;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: end;
      padding: 28px 0 22px;
    }

    h1 {
      margin: 0;
      font-size: 58px;
      line-height: .96;
      letter-spacing: 0;
    }

    .sub {
      max-width: 740px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      min-width: 330px;
    }

    .stat {
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .stat b {
      display: block;
      font-size: 24px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 18px;
    }

    .toolbar > * {
      flex: 1 1 150px;
      min-width: 0;
    }

    select, input, textarea {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 10px 12px;
      min-height: 42px;
      max-width: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 860px);
      gap: 18px;
      align-items: start;
      justify-content: center;
    }

    .panel {
      background: rgba(255,255,255,.86);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .trainer {
      min-height: 520px;
      padding: 22px;
      display: grid;
      align-content: start;
      gap: 16px;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
      gap: 8px;
    }

    .mode-tabs button {
      background: white;
      color: var(--ink);
      border-color: var(--line);
      padding: 10px 8px;
    }

    .mode-tabs button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .card {
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      padding: 28px;
      min-height: 300px;
      display: grid;
      align-content: center;
      gap: 14px;
    }

    .tag {
      width: fit-content;
      border-radius: 999px;
      background: var(--soft);
      color: var(--accent);
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .meta-pill {
      width: fit-content;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 750;
    }

    .trap-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .trap {
      border: 1px solid #fed7aa;
      background: #fff7ed;
      color: var(--accent-2);
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 13px;
      font-weight: 800;
    }

    .word {
      font-size: 56px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      hyphens: auto;
    }

    .translation {
      font-size: clamp(24px, 4vw, 38px);
      color: var(--accent-2);
      font-weight: 700;
      line-height: 1.12;
      overflow-wrap: anywhere;
    }

    .solution-display {
      font-size: clamp(36px, 7vw, 68px);
      line-height: 1.04;
      font-weight: 900;
      color: var(--good);
      overflow-wrap: anywhere;
    }

    .solution-display .chunk {
      background: #ecfdf3;
      color: var(--good);
      border: 1px solid #bbf7d0;
    }

    .solution-display .chunk.tricky {
      background: #dcfce7;
      color: #166534;
      border-color: #86efac;
      box-shadow: inset 0 -4px 0 rgba(21, 128, 61, .25);
    }

    .example {
      color: var(--muted);
      line-height: 1.55;
      font-size: 17px;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .choices button {
      text-align: left;
      background: white;
      color: var(--ink);
      border-color: var(--line);
      min-height: 58px;
    }

    .choices button.correct {
      border-color: var(--good);
      background: #ecfdf3;
    }

    .choices button.wrong {
      border-color: var(--bad);
      background: #fef2f2;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .actions button {
      flex: 1 1 150px;
    }

    .feedback {
      min-height: 28px;
      font-weight: 700;
    }

    .feedback.good { color: var(--good); }
    .feedback.bad { color: var(--bad); }
    .feedback.warn { color: var(--warn); }

    .box {
      padding: 18px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
      letter-spacing: 0;
    }

    .plan {
      display: grid;
      gap: 8px;
    }

    .day {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .day:first-child { border-top: 0; }

    .day b {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--soft);
      color: var(--accent);
    }

    .day p {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
    }

    .paper-steps {
      display: grid;
      gap: 10px;
      padding: 0;
      margin: 0;
      counter-reset: paper;
    }

    .paper-steps li {
      list-style: none;
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: start;
      color: var(--muted);
      line-height: 1.4;
    }

    .paper-steps li::before {
      counter-increment: paper;
      content: counter(paper);
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #fff7ed;
      color: var(--accent-2);
      font-weight: 800;
      font-size: 13px;
    }

    .wordlist {
      max-height: 390px;
      overflow: auto;
      border-top: 1px solid var(--line);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .row span:last-child { color: var(--muted); }

    .sentence textarea {
      width: 100%;
      min-height: 118px;
      resize: vertical;
    }

    .mini {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .test-setup {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .test-row {
      display: grid;
      grid-template-columns: minmax(140px, .8fr) minmax(180px, 1fr);
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .test-row:first-child { border-top: 0; }

    .test-row input { width: 100%; }

    .result-table {
      max-height: 320px;
      overflow: auto;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .result-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
      font-size: 14px;
    }

    .result-row:first-child { border-top: 0; }

    .result-row small {
      color: var(--muted);
      display: block;
      margin-top: 3px;
    }

    .spelling-word {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      font-size: 54px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .chunk {
      display: inline-flex;
      align-items: center;
      min-height: 1.1em;
      border-radius: 8px;
      padding: 3px 6px;
      background: #f3f4f6;
    }

    .chunk.tricky {
      background: #fff7ed;
      color: var(--accent-2);
      border: 1px solid #fed7aa;
      box-shadow: inset 0 -4px 0 rgba(180, 83, 9, .30);
    }

    .letter-map {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }

    .letter-map span {
      display: grid;
      place-items: center;
      min-width: 28px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      font-weight: 800;
    }

    .letter-map .tricky {
      border-color: #fed7aa;
      background: #fff7ed;
      color: var(--accent-2);
    }

    .diff {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .diff-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: white;
      min-height: 70px;
    }

    .diff-box b {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .diff-text {
      font-size: 22px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .diff-text mark {
      background: #fee2e2;
      color: var(--bad);
      border-radius: 4px;
      padding: 0 2px;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .analysis-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: white;
    }

    .analysis-item b {
      display: block;
      margin-bottom: 4px;
    }

    @media (max-width: 900px) {
      header, .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 44px;
      }

      .stats {
        min-width: 0;
      }

      .choices {
        grid-template-columns: 1fr 1fr;
      }

      .test-setup, .test-row, .result-row, .diff, .analysis-grid {
        grid-template-columns: 1fr;
      }

      .word {
        font-size: 46px;
      }

      .spelling-word {
        font-size: 44px;
      }
    }

    @media (max-width: 560px) {
      .app { padding: 12px; }

      header {
        gap: 12px;
        padding: 16px 0 12px;
      }

      h1 {
        font-size: 32px;
        line-height: 1;
      }

      .stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .stat {
        padding: 8px;
      }

      .stat b {
        font-size: 19px;
      }

      .stat span {
        font-size: 10px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 10px;
      }

      .trainer {
        min-height: 0;
        padding: 12px;
        gap: 12px;
      }

      .mode-tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
      }

      .mode-tabs button {
        padding: 10px 6px;
      }

      .card {
        min-height: 0;
        padding: 16px;
        gap: 12px;
      }

      .word {
        font-size: 34px;
        line-height: 1.08;
      }

      .translation {
        font-size: 20px;
      }

      .example {
        font-size: 15px;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .actions button,
      .toolbar button,
      select,
      input,
      textarea {
        width: 100%;
      }

      .box {
        padding: 14px;
      }

      .day {
        grid-template-columns: 34px 1fr;
        gap: 9px;
      }

      .day b {
        width: 30px;
        height: 30px;
      }

      .row { grid-template-columns: 1fr; }

      .test-setup {
        grid-template-columns: 1fr;
      }

      .test-row,
      .result-row {
        gap: 8px;
        padding: 12px 0;
      }

      .spelling-word {
        font-size: 32px;
        line-height: 1.08;
      }

      .letter-map span {
        min-width: 24px;
        height: 29px;
      }

      .diff-text {
        font-size: 18px;
      }
    }

    @media (max-width: 360px) {
      .stats {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 29px;
      }

      .mode-tabs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Vokabeltraining<br>Across cultures 3</h1>
      </div>
      <section class="stats" aria-label="Lernstand">
        <div class="stat"><b id="knownCount">0</b><span>sicher</span></div>
        <div class="stat"><b id="practiceCount">0/0</b><span>fällig/geübt</span></div>
        <div class="stat"><b id="accuracy">0%</b><span>Trefferquote</span></div>
      </section>
    </header>

    <section class="toolbar" aria-label="Filter">
      <select id="topicFilter"></select>
      <select id="direction">
        <option value="de-en">Deutsch → Englisch</option>
        <option value="en-de">Englisch → Deutsch</option>
      </select>
      <select id="difficulty">
        <option value="easy">Stufe 1 · Einprägen</option>
        <option value="medium">Stufe 2 · Direkt schreiben</option>
        <option value="hard">Stufe 3 · Test hart</option>
      </select>
      <button class="ghost" id="dueOnly">Heute fällig</button>
      <button class="ghost" id="weakOnly">Nur schwache Wörter</button>
      <button class="ghost" id="exportBtn">Anki/Quizlet-Export</button>
      <button class="ghost" id="resetBtn">Fortschritt löschen</button>
    </section>

    <section class="grid">
      <div class="panel trainer">
        <nav class="mode-tabs" aria-label="Trainingsmodus">
          <button class="active" data-mode="flash">Karte</button>
          <button data-mode="choice">Quiz</button>
          <button data-mode="cloze">Lücke</button>
          <button data-mode="sentence">Satz</button>
          <button data-mode="spelling">Spelling</button>
          <button data-mode="analysis">Analyse</button>
          <button data-mode="test">Test</button>
        </nav>
        <div id="exercise"></div>
      </div>

      <section class="panel box wordlist-panel">
        <h2>Wortliste</h2>
        <div class="wordlist" id="wordlist"></div>
      </section>
    </section>
  </main>

  <script src="english-vocab-data.js"></script>
  <script>
    const fallbackWords = [
      {en:"mile", de:"Meile", topic:"Story", ex:"A mile is 1,609 metres."},

    function toTrainerWord(entry) {
      if (entry.en) return entry;
      return {
        id: entry.id,
        en: entry.english,
        de: Array.isArray(entry.german) ? entry.german.join("; ") : entry.german,
        topic: entry.topic || entry.courseArea || "Vokabeln",
        ex: entry.example || "",
        cloze: entry.cloze || "",
        clozeAnswer: entry.clozeAnswer || entry.english,
        wordType: entry.wordType || "word",
        difficulty: entry.difficulty || 2,
        spelling: entry.spelling || {chunks: [], traps: []},
        tags: entry.tags || [],
        trainerModes: entry.trainerModes || [],
        paperPrompt: entry.paperPrompt || "Englische Vokabel und einen kurzen Beispielsatz auf Papier schreiben.",
        errorTypes: entry.errorTypes || ["meaning", "spelling"]
      };
    }

    function save() {
      localStorage.setItem("ac3-progress", JSON.stringify(state.progress));
      renderStats();
    }

    function key(word) {
      return word.en;
    }

    function record(word, ok) {
      const id = key(word);
      const p = state.progress[id] || {right:0, wrong:0, box:0, due:0, paperOk:0, paperSpelling:0, paperWrong:0};
      if (ok) {
        p.right += 1;
        p.box = Math.min((p.box || 0) + 1, 5);
      } else {
        p.wrong += 1;
        p.box = 0;
      }
      p.last = Date.now();
      p.due = nextDueDate(p.box, ok);
      state.progress[id] = p;
      save();
    }

    function recordPaper(word, result) {
      const id = key(word);
      const p = state.progress[id] || {right:0, wrong:0, box:0, due:0, paperOk:0, paperSpelling:0, paperWrong:0};
      if (result === "ok") p.paperOk = (p.paperOk || 0) + 1;
      if (result === "spelling") {
        p.paperSpelling = (p.paperSpelling || 0) + 1;
        p.box = Math.min(p.box || 0, 1);
        p.due = nextDueDate(0, false);
      }
      if (result === "wrong") {
        p.paperWrong = (p.paperWrong || 0) + 1;
        p.box = 0;
        p.due = nextDueDate(0, false);
      }
      p.lastPaper = Date.now();
      state.progress[id] = p;
      save();
    }

    function score(word) {
      const p = state.progress[key(word)] || {right:0, wrong:0, box:0, paperSpelling:0, paperWrong:0};
      return p.right - p.wrong * 1.5 - (p.paperSpelling || 0) * .7 - (p.paperWrong || 0) * 1.2;
    }

    function nextDueDate(box, ok) {
      const days = ok ? [0, 1, 3, 7, 14, 30][box] || 30 : 0;
      const date = new Date();
      date.setHours(0, 0, 0, 0);
      date.setDate(date.getDate() + days);
      return date.getTime();
    }

    function isDue(word) {
      const p = state.progress[key(word)];
      if (!p || !p.due) return true;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return p.due <= today.getTime();
    }

    function filteredWords() {
      let list = words.filter(w => state.topic === "Alle Themen" || w.topic === state.topic);
      if (state.dueOnly) list = list.filter(isDue);
      if (state.weakOnly) list = list.filter(w => score(w) < 2);
      return list.length ? list : words;
    }

    function pickWord() {
      const list = filteredWords();
      const weighted = [...list].sort((a, b) => score(a) - score(b));
      return weighted[Math.floor(Math.random() * Math.min(18, weighted.length))];
    }

    function promptOf(word) {
      return state.direction === "en-de" ? word.en : word.de;
    }

    function answerOf(word) {
      return state.direction === "en-de" ? word.de : word.en;
    }

    function normalize(value) {
      return value.toLowerCase().trim().replace(/[.;,!?]/g, "").replace(/\s+/g, " ");
    }

    function acceptAnswer(input, expected) {
      const a = normalize(input);
      return expected.split(";").some(part => {
        const p = normalize(part);
        return a === p || a.includes(p) || p.includes(a);
      });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function next() {
      state.current = pickWord();
      state.answered = false;
      renderExercise();
      renderList();
    }

    function renderExercise() {
      const word = state.current || pickWord();
      state.current = word;
      if (state.mode === "flash") renderFlash(word);
      if (state.mode === "choice") renderChoice(word);
      if (state.mode === "cloze") renderCloze(word);
      if (state.mode === "sentence") renderSentence(word);
      if (state.mode === "spelling") renderSpelling(word);
      if (state.mode === "analysis") renderAnalysis();
      if (state.mode === "test") renderTest();
    }

    function trickyIndexes(text) {
      const lower = text.toLowerCase();
      const indexes = new Set();
      const patterns = [
        "ough", "igh", "tion", "sion", "ious", "eous", "ie", "ei", "ea", "ee", "oo", "ou", "ow",
        "ph", "th", "ch", "sh", "ck", "qu", "y", "wr", "kn", "gn", "mb", "ll", "ss", "nn", "mm",
        "rr", "pp", "tt", "ff", "cc", "sc", "ce", "ci", "ge", "gi"
      ];
      patterns.forEach(pattern => {
        let start = lower.indexOf(pattern);
        while (start !== -1) {
          for (let i = start; i < start + pattern.length; i += 1) indexes.add(i);
          start = lower.indexOf(pattern, start + 1);
        }
      });
      return indexes;
    }

    function spellingTraps(word) {
      if (word && word.spelling && Array.isArray(word.spelling.traps)) return word.spelling.traps.filter(Boolean);
      return [];
    }

    function spellingFocus(word) {
      const text = word.en.toLowerCase();
      const items = [];
      const patternLabels = [
        ["igh", "igh"],
        ["ough", "ough"],
        ["tion", "-tion"],
        ["sion", "-sion"],
        ["ious", "-ious"],
        ["eous", "-eous"],
        ["ie", "ie"],
        ["ei", "ei"],
        ["ea", "ea"],
        ["ee", "ee"],
        ["oo", "oo"],
        ["ou", "ou"],
        ["ow", "ow"],
        ["ph", "ph"],
        ["th", "th"],
        ["ch", "ch"],
        ["sh", "sh"],
        ["ck", "ck"],
        ["qu", "qu"],
        ["wr", "wr"],
        ["kn", "kn"],
        ["gn", "gn"],
        ["mb", "mb"]
      ];
      patternLabels.forEach(([pattern, label]) => {
        if (text.includes(pattern)) items.push(label);
      });
      const doubles = [...new Set((text.match(/([a-z])\1/g) || []))];
      doubles.forEach(pair => items.push(`Doppel-${pair[0]}`));
      if (text.includes("-")) items.push("Bindestrich");
      if (text.includes("'")) items.push("Apostroph");
      if (text.includes(" ")) items.push("als ganze Wortgruppe");
      return [...new Set(items)];
    }

    function trickyIndexesForWord(word) {
      const text = typeof word === "string" ? word : word.en;
      const indexes = trickyIndexes(text);
      spellingTraps(word).forEach(trap => {
        const lower = text.toLowerCase();
        const target = String(trap).toLowerCase();
        let start = lower.indexOf(target);
        while (start !== -1) {
          for (let i = start; i < start + target.length; i += 1) indexes.add(i);
          start = lower.indexOf(target, start + 1);
        }
      });
      return indexes;
    }

    function visualWord(value) {
      const text = typeof value === "string" ? value : value.en;
      const chunks = typeof value === "object" && value.spelling && Array.isArray(value.spelling.chunks) ? value.spelling.chunks : [];
      if (chunks.length > 1) {
        return chunks.map(chunk => {
          const textPart = typeof chunk === "string" ? chunk : chunk.text;
          if (!textPart) return "";
          if (/^\s+$/.test(textPart)) return escapeHtml(textPart);
          const indexes = trickyIndexes(textPart);
          const isTricky = [...textPart].some((_, index) => indexes.has(index));
          return `<span class="chunk ${isTricky ? "tricky" : ""}">${escapeHtml(textPart)}</span>`;
        }).join("");
      }
      const indexes = trickyIndexesForWord(value);
      let html = "";
      let buffer = "";
      let tricky = indexes.has(0);
      [...text].forEach((char, index) => {
        const current = indexes.has(index);
        if (current !== tricky && buffer) {
          html += `<span class="chunk ${tricky ? "tricky" : ""}">${escapeHtml(buffer)}</span>`;
          buffer = "";
        }
        tricky = current;
        buffer += char;
      });
      if (buffer) html += `<span class="chunk ${tricky ? "tricky" : ""}">${escapeHtml(buffer)}</span>`;
      return html;
    }

    function letterMap(value) {
      const text = typeof value === "string" ? value : value.en;
      const indexes = trickyIndexesForWord(value);
      return [...text].map((char, index) => `<span class="${indexes.has(index) ? "tricky" : ""}">${escapeHtml(char)}</span>`).join("");
    }

    function metaLine(word) {
      const labels = {
        phrase: "Mehrwortausdruck",
        phrasal_verb: "Phrasal verb",
        verb: "Verb",
        noun: "Nomen",
        adjective: "Adjektiv",
        adverb: "Adverb"
      };
      return `
        <div class="meta-line">
          <span class="meta-pill">${labels[word.wordType] || "Vokabel"}</span>
        </div>
      `;
    }

    function trapList(word) {
      const focus = spellingFocus(word);
      if (!focus.length) return "";
      return `<div class="trap-list">${focus.map(item => `<span class="trap">${escapeHtml(item)}</span>`).join("")}</div>`;
    }

    function clozeText(word) {
      if (word.cloze && word.cloze.includes("[...]")) return word.cloze.replace("[...]", "_____");
      if (word.cloze && word.cloze.includes("___")) return word.cloze.replace(/_{3,}/g, "_____");
      const source = word.ex || "";
      const answer = word.clozeAnswer || word.en;
      const blanked = source.replace(new RegExp(answer.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "i"), "_____");
      return blanked.includes("_____") ? blanked : `${source} → _____`;
    }

    function capitalizeFirst(value) {
      return value ? value.charAt(0).toUpperCase() + value.slice(1) : value;
    }

    function isClozeAtSentenceStart(word) {
      return clozeText(word).trim().startsWith("_____");
    }

    function clozeAnswerForDisplay(word) {
      const answer = word.clozeAnswer || word.en;
      return isClozeAtSentenceStart(word) ? capitalizeFirst(answer) : answer;
    }

    function clozeAcceptedAnswers(word) {
      return [...new Set([word.en, word.clozeAnswer, clozeAnswerForDisplay(word)].filter(Boolean))].join(";");
    }

    function shouldHideEnglishHints() {
      return state.direction === "de-en" && state.difficulty !== "easy";
    }

    function maskedExample(word) {
      if (!shouldHideEnglishHints()) return word.ex;
      return clozeText(word).replaceAll("_____", "[...]");
    }

    function exampleBlock(word) {
      const text = maskedExample(word);
      return text ? `<p class="example">${text}</p>` : "";
    }

    function solutionHtml(word) {
      if (state.direction === "de-en") {
        return `<div class="solution-display">${visualWord(word)}</div>${trapList(word)}`;
      }
      return escapeHtml(answerOf(word));
    }

    function exactSpelling(input, expected) {
      return input.trim().toLowerCase() === expected.trim().toLowerCase();
    }

    function diffHtml(input, expected) {
      const typed = input.trim();
      const max = Math.max(typed.length, expected.length);
      let typedHtml = "";
      let expectedHtml = "";
      for (let i = 0; i < max; i += 1) {
        const a = typed[i] || "□";
        const b = expected[i] || "□";
        const same = (typed[i] || "").toLowerCase() === (expected[i] || "").toLowerCase();
        typedHtml += same ? escapeHtml(a) : `<mark>${escapeHtml(a)}</mark>`;
        expectedHtml += same ? escapeHtml(b) : `<mark>${escapeHtml(b)}</mark>`;
      }
      return { typedHtml, expectedHtml };
    }

    function spellingHint(word) {
      const focus = spellingFocus(word);
      if (focus.length) {
        return `Merke dir besonders: ${focus.join(" · ")}. Sieh die markierten Stellen an, decke das Wort ab und schreibe es danach ohne Vorlage.`;
      }
      const lower = word.en.toLowerCase();
      const hints = [];
      if (/(.)\1/.test(lower)) hints.push("Achte auf Doppelbuchstaben.");
      if (lower.includes("y")) hints.push("Merke dir die Position von y.");
      if (lower.includes("tion") || lower.includes("sion")) hints.push("Endung bewusst als Block merken.");
      if (lower.includes("igh")) hints.push("igh ist ein gemeinsamer Lautblock.");
      if (lower.includes("ie") || lower.includes("ei")) hints.push("ie/ei-Reihenfolge genau anschauen.");
      if (lower.includes("ou") || lower.includes("ow") || lower.includes("ea") || lower.includes("ee")) hints.push("Vokalgruppe als Bild merken.");
      return hints.length ? hints.join(" ") : "Zerlege das Wort in sichtbare Teile und merke dir die Wortform als Bild.";
    }

    function renderChoice(word) {
      const options = [answerOf(word)];
      const pool = words.filter(w => w !== word).sort(() => Math.random() - .5);
      for (const item of pool) {
        const option = state.direction === "en-de" ? item.de : item.en;
        if (!options.includes(option)) options.push(option);
        if (options.length === 4) break;
      }
      options.sort(() => Math.random() - .5);
      exercise.innerHTML = `
        <article class="card">
          <span class="tag">${word.topic}</span>
          <div class="word">${promptOf(word)}</div>
          ${exampleBlock(word)}
          <div class="choices">
            ${options.map(option => `<button data-option="${option.replaceAll('"', '&quot;')}">${option}</button>`).join("")}
          </div>
          <div class="feedback" id="feedback"></div>
        </article>
        <div class="actions">
          <button id="nextBtn">Papier-Schritt</button>
        </div>
      `;
      document.querySelectorAll("[data-option]").forEach(button => {
        button.onclick = () => {
          if (state.answered) return;
          state.answered = true;
          const ok = button.dataset.option === answerOf(word);
          record(word, ok);
          button.classList.add(ok ? "correct" : "wrong");

        if (state.answered) renderPaperCheck(word);
        else next();
      };

    function renderSentence(word) {

    function makeTest(size, directionMode) {
      const list = filteredWords()
        .slice()
        .sort((a, b) => score(a) - score(b) || Math.random() - .5)
        .slice(0, size);
      state.test = {
        direction: directionMode,
        words: list,
        checked: false,
        results: []
      };
      renderTest();
    }

    function renderTest() {
      if (!state.test) {
        exercise.innerHTML = `
          <article class="card">
            <span class="tag">Vokabeltest</span>
            <div class="word">Schriftliche Probe</div>
            <p class="example">Wähle Länge und Richtung. Dann werden die Lösungen versteckt abgefragt, so wie im Test: erst auf Papier schreiben, dann eintippen, prüfen, Fehler gezielt wiederholen.</p>
            <div class="test-setup">
              <button class="accent" data-test-size="10">10 Wörter</button>
              <button data-test-size="20">20 Wörter</button>
              <button data-test-size="30">30 Wörter</button>
            </div>
            <p class="mini">Tipp: Für die Klassenarbeit zuerst Deutsch → Englisch trainieren. Das ist schwerer und deckt Rechtschreibung besser auf. Die App terminiert richtige Wörter automatisch neu.</p>
          </article>
        `;
        document.querySelectorAll("[data-test-size]").forEach(button => {
          button.onclick = () => makeTest(Number(button.dataset.testSize), state.direction);
        });
        return;
      }

      if (state.test.checked) {
        renderTestResult();
        return;
      }

      const label = state.test.direction === "en-de" ? "Deutsch eintragen" : "Englisch eintragen";
      exercise.innerHTML = `
        <article class="card">
          <span class="tag">Test läuft · ${state.test.words.length} Wörter</span>
          <div class="word">Ohne Spicken</div>
          <p class="example">Schreibe die Antworten zuerst auf Papier. Tippe sie danach ein. Teilantworten mit Semikolon sind erlaubt, aber Rechtschreibung zählt besonders bei Englisch.</p>
          <div>
            ${state.test.words.map((word, index) => `
              <label class="test-row">
                <span><b>${index + 1}. ${state.test.direction === "en-de" ? word.en : word.de}</b><br><small>${word.topic}</small></span>
                <input data-test-answer="${index}" autocomplete="off" placeholder="${label}">
              </label>
            `).join("")}
          </div>
          <div class="feedback" id="feedback"></div>
        </article>
        <div class="actions">
          <button class="accent" id="checkTestBtn">Test auswerten</button>
          <button class="ghost" id="cancelTestBtn">Neu starten</button>
        </div>
      `;
      document.querySelector("#checkTestBtn").onclick = checkTest;
      document.querySelector("#cancelTestBtn").onclick = () => { state.test = null; renderTest(); };
      document.querySelector("[data-test-answer='0']")?.focus();
    }

    function checkTest() {
      const results = state.test.words.map((word, index) => {
        const input = document.querySelector(`[data-test-answer="${index}"]`).value;
        const expected = state.test.direction === "en-de" ? word.de : word.en;
        const ok = acceptAnswer(input, expected);
        record(word, ok);
        return { word, input, expected, ok };
      });
      state.test.results = results;
      state.test.checked = true;
      renderTestResult();
    }

    function renderTestResult() {
      const results = state.test.results;
      const right = results.filter(result => result.ok).length;
      const percent = Math.round(right / results.length * 100);
      const grade =
        percent >= 92 ? "1" :
        percent >= 80 ? "2" :
        percent >= 65 ? "3" :
        percent >= 50 ? "4" :
        percent >= 25 ? "5" : "6";
      const wrong = results.filter(result => !result.ok);
      exercise.innerHTML = `
        <article class="card">
          <span class="tag">Auswertung</span>
          <div class="word">${right}/${results.length} richtig</div>
          <div class="translation">${percent}% · ungefähr Note ${grade}</div>
          <p class="example">${wrong.length ? "Diese Fehler jetzt sofort noch einmal lernen. Genau hier entsteht der Lerneffekt." : "Sehr stark. Jetzt einmal schlafen lassen und morgen kurz wiederholen."}</p>
          <div class="result-table">
            ${results.map(result => `
              <div class="result-row">
                <span><b>${result.word.en}</b><small>${result.word.de}</small></span>
                <span>${result.input || "—"}</span>
                <span class="${result.ok ? "feedback good" : "feedback bad"}">${result.ok ? "richtig" : `richtig: ${result.expected}`}</span>
              </div>
            `).join("")}
          </div>
        </article>
        <div class="actions">
          <button class="accent" id="repeatWrongBtn" ${wrong.length ? "" : "disabled"}>Nur Fehler üben</button>
          <button id="newTestBtn">Neuer Test</button>
          <button class="ghost" id="copyResultBtn">Ergebnis kopieren</button>
        </div>
      `;
      document.querySelector("#repeatWrongBtn").onclick = () => {
        state.weakOnly = true;
        weakOnly.classList.add("accent");
        weakOnly.classList.remove("ghost");
        state.test = {
          direction: state.direction,
          words: wrong.map(result => result.word),
          checked: false,
          results: []
        };
        renderTest();
      };
      document.querySelector("#newTestBtn").onclick = () => { state.test = null; renderTest(); };
      document.querySelector("#copyResultBtn").onclick = () => {
        const text = results.map((result, index) => `${index + 1}. ${result.word.en} / ${result.word.de} | Antwort: ${result.input || "-"} | ${result.ok ? "richtig" : "falsch"}`).join("\n");
        navigator.clipboard?.writeText(`Vokabeltest: ${right}/${results.length} richtig (${percent}%, Note ${grade})\n${text}`);
      };
    }

    function renderList() {
      const list = filteredWords();
      wordlist.innerHTML = list.map(word => {
        const p = state.progress[key(word)] || {right:0, wrong:0, box:0, paperSpelling:0, paperWrong:0};
        const dueText = isDue(word) ? "heute fällig" : `Box ${p.box}`;
        const paperText = (p.paperSpelling || p.paperWrong) ? ` · Papierfehler ${p.paperSpelling || 0}/${p.paperWrong || 0}` : "";
        return `<div class="row"><span><b>${word.en}</b><br><small>${word.topic} · ${p.right}/${p.wrong} · ${dueText}${paperText}</small></span><span>${word.de}</span></div>`;
      }).join("");
    }

    function renderStats() {
      const entries = Object.values(state.progress);
      const right = entries.reduce((sum, p) => sum + p.right, 0);
      const wrong = entries.reduce((sum, p) => sum + p.wrong, 0);
      const known = words.filter(w => score(w) >= 3).length;
      const due = words.filter(isDue).length;
      document.querySelector("#knownCount").textContent = known;
      document.querySelector("#practiceCount").textContent = `${due}/${right + wrong}`;
      document.querySelector("#accuracy").textContent = right + wrong ? `${Math.round(right / (right + wrong) * 100)}%` : "0%";
    }

    function initTopics() {
      const topics = ["Alle Themen", ...new Set(words.map(w => w.topic))];
      topicFilter.innerHTML = topics.map(topic => `<option>${topic}</option>`).join("");
    }

    function exportTSV() {
      const lines = ["English\tDeutsch\tExample\tTopic", ...words.map(w => `${w.en}\t${w.de}\t${w.ex}\t${w.topic}`)];
      const blob = new Blob([lines.join("\n")], {type: "text/tab-separated-values"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "across-cultures-3-vokabeln.tsv";
      a.click();
      URL.revokeObjectURL(url);
    }

    document.querySelectorAll("[data-mode]").forEach(button => {
      button.onclick = () => {
        document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
        button.classList.add("active");
        state.mode = button.dataset.mode;
        next();
      };
    });

    topicFilter.onchange = () => { state.topic = topicFilter.value; next(); };
    direction.onchange = () => { state.direction = direction.value; next(); };
    difficulty.onchange = () => { state.difficulty = difficulty.value; next(); };
    dueOnly.onclick = () => {
      state.dueOnly = !state.dueOnly;
      dueOnly.classList.toggle("accent", state.dueOnly);
      dueOnly.classList.toggle("ghost", !state.dueOnly);
      next();
    };
    weakOnly.onclick = () => {
      state.weakOnly = !state.weakOnly;
      weakOnly.classList.toggle("accent", state.weakOnly);
      weakOnly.classList.toggle("ghost", !state.weakOnly);
      next();
    };
    document.querySelector("#exportBtn").onclick = exportTSV;
    document.querySelector("#resetBtn").onclick = () => {
      if (confirm("Fortschritt wirklich löschen?")) {
        state.progress = {};
        save();
        next();
      }
    };

    initTopics();
    renderStats();
    next();
  </script>
</body>
</html>
